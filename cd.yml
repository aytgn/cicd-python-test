name: Python CD Paketleme

# 1. TETİKLEYİCİ: Başka bir iş akışını dinle
on:
  workflow_run:
    workflows: ["Python CI Otomasyonu"] # ci.yml içindeki 'name' ile BİREBİR aynı olmalı!
    types:
      - completed

jobs:
  docker-paketle:
    runs-on: ubuntu-latest
    
    # 2. GÜVENLİK DUVARI: Sadece CI süreci 'success' (başarılı) olduysa bu makineyi çalıştır!
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Kodumuzu Sunucuya İndir
        uses: actions/checkout@v3

      - name: Docker İmajını Oluştur (Build)
        run: docker build -t aytu-calculator .